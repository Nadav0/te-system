version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: te_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: te_db
      POSTGRES_USER: te_user
      POSTGRES_PASSWORD: te_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U te_user -d te_db']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: te_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://te_user:te_password@db:5432/te_db
      SECRET_KEY: supersecretkey-change-in-production-32chars!!
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      UPLOAD_DIR: /app/uploads
    ports:
      - '8000:8000'
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: te_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  pgdata:
  uploads:
