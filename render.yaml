services:
  - type: web
    name: te-system-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-app.netlify.app
      - key: SECRET_KEY
        generateValue: true
    plan: free
